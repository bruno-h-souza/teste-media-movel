version: '3.8'

services:
  # Container do Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mmsdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # O MySQL executa os scripts nesta pasta ao iniciar
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Container da nossa API em Go
  api:
    build: .
    container_name: go_mms_teste_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_USER=root
      - DB_PASSWORD=secret
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=usersdb
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: